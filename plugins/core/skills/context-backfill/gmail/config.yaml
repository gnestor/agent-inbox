# Email backfill filter rules for qmd index
#
# All patterns are case-insensitive substring matches.
# sender_patterns match against the full "From:" header value (name + address).
# subject_patterns match against the message Subject header.
#
# Evaluation order:
#   1. include.sender_patterns — override all excludes
#   2. exclude.sender_patterns — skip thread
#   3. exclude.subject_patterns — skip thread
#   4. exclude.internal_senders — skip as primary contact (these are Hammies internal)

include:
  # Force-include senders even if they match an exclude pattern.
  # Useful for invoices and receipts that are valuable to query.
  sender_patterns: []

exclude:
  # Hammies internal addresses — not external contacts
  internal_senders:
